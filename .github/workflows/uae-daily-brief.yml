name: UAE Daily Brief Telegram

on:
  schedule:
    # 03:00 UTC = 07:00 UAE time.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: uae-daily-brief-telegram
  cancel-in-progress: true

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: Asia/Dubai
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Arabic rendering system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libraqm-dev \
            libfribidi-dev \
            libharfbuzz-dev \
            libfreetype6-dev \
            libjpeg-dev \
            zlib1g-dev \
            libpng-dev \
            fonts-noto-core \
            fonts-noto-extra

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --force-reinstall --no-binary=Pillow "Pillow>=10.4.0"
          python -m pip install -r requirements.txt

      - name: Verify Arabic rendering support
        run: |
          python -c "from PIL import features; assert features.check('raqm'), 'Pillow RAQM support is missing'"

      - name: Verify Telegram secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"

      - name: Generate and send PDF to Telegram
        run: python send_to_telegram.py

      - name: Upload generated PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uae-daily-brief-pdfs
          path: |
            uae_daily_brief.pdf
            briefs/*.pdf
          if-no-files-found: ignore
          retention-days: 14
