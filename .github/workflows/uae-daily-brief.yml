name: UAE Daily Brief Telegram

on:
  schedule:
    # 04:00 UTC = 08:00 UAE time.
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: uae-daily-brief-telegram
  cancel-in-progress: true

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: Asia/Dubai
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify Telegram secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"

      - name: Generate and send PDF to Telegram
        run: python send_to_telegram.py

      - name: Upload generated PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uae-daily-brief-pdfs
          path: |
            uae_daily_brief.pdf
            briefs/*.pdf
          if-no-files-found: ignore
          retention-days: 14
